#
# Minimized Build: ImmortalWrt + NanoPi R2S + OpenClash
# Based on smallprogram/OpenWrtAction (MIT License)
#

name: Build-R2S-OpenClash

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions (true/false)'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: config/r2s_minimal/R2S.config
  DIY_P1_SH: diy_script/r2s_diy/diy-part1.sh
  DIY_P2_SH: diy_script/r2s_diy/diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build-ImmortalWrt-R2S

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # Free up disk space
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift
          sudo docker image prune --all --force 2>/dev/null || true

          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake \
            autopoint binutils bison build-essential bzip2 ccache clang cmake \
            cpio curl device-tree-compiler ecj fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man \
            intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev \
            libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev \
            libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip \
            p7zip-full patch pkgconf python3 python3-pip python3-ply \
            python3-docutils python3-pyelftools qemu-utils re2c rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
            vim wget xmlto xxd zlib1g-dev zstd
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown -R $USER:$GROUPS /workdir
          df -hT

      - name: Clone Source Code
        working-directory: /workdir
        run: |
          git clone -b $REPO_BRANCH --single-branch --depth 1 $REPO_URL openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load Custom Feeds (DIY Part 1)
        run: |
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Configuration (DIY Part 2)
        run: |
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH
          # Re-install feeds after part2 modifications
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply .config
        run: |
          [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE openwrt/.config
          cd openwrt
          make defconfig

      - name: Download Packages
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: SSH Connection to Actions
        uses: mxschmitt/action-tmate@v3.23
        if: github.event.inputs.ssh == 'true'

      - name: Compile Firmware
        id: compile
        run: |
          cd openwrt
          echo "$(nproc) thread compile"
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r \
            's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && \
            echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          df -hT

      - name: Organize Files
        id: organize
        if: steps.compile.outputs.status == 'success' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          # Keep only firmware images and sha256sums
          rm -rf packages feeds_packages *.buildinfo *.json *.manifest
          echo "FIRMWARE=$PWD" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Firmware to Artifact
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success'
        with:
          name: ImmortalWrt_R2S_OpenClash_${{ env.FILE_DATE }}
          path: ${{ steps.organize.outputs.FIRMWARE }}

      - name: Generate Release Tag
        id: tag
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=R2S-OpenClash_$(date +"%Y.%m.%d_%H.%M")" >> $GITHUB_OUTPUT

      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.release_tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body: |
            ### NanoPi R2S Minimal Firmware (ImmortalWrt + OpenClash)
            - **Source:** ImmortalWrt ${{ env.REPO_BRANCH }}
            - **Target:** Rockchip armv8 / NanoPi R2S
            - **Key Package:** OpenClash (with Mihomo/Meta core)
            - **Default IP:** 192.168.1.1
            - **Default Login:** root (no password)
          files: ${{ steps.organize.outputs.FIRMWARE }}/*
